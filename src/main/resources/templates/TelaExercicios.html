<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurora - Exercícios</title>
    <link rel="stylesheet" href="TelaExercicios.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar-main">
            <div class="logo-section">
                <div class="icon-wrapper">
                    <i class="fas fa-graduation-cap" aria-hidden="true"></i>
                </div>
            </div>
            <nav class="nav-menu">
                <a href="/inicio" class="nav-item"><i class="fas fa-th-large"></i> Início</a>
                <a href="/disciplinas" class="nav-item"><i class="fas fa-book"></i> Disciplinas</a>
                <a href="/exercicios" class="nav-item active"><i class="fas fa-edit"></i> Exercícios</a>
                <a href="/provas" class="nav-item"><i class="fas fa-file-alt"></i> Provas anteriores</a>
                <a href="/material" class="nav-item"><i class="fas fa-plus-circle"></i> Material extra</a>
                <a href="/perfil" class="nav-item"><i class="fas fa-user"></i> Perfil</a>
                <div class="spacer"></div>
                <a href="/login" class="nav-item logout"><i class="fas fa-sign-out-alt"></i> Sair</a>
            </nav>
        </aside>

        <main class="main-layout">
            <header class="header-top">
                <div class="search-global">
                    <input type="text" placeholder="Pesquisar">
                </div>
            </header>

            <section class="content-body">
                <h1 class="title-page">Exercícios</h1>
                
         
   <div class="disciplinas-list">
    <a th:each="ex : ${exercicios}" 
       th:href="${ex.url}" 
       target="_blank" 
       class="disciplina-button" 
       th:text="${ex.titulo}">
       Nome do Exercício
    </a>
    
    <p th:if="${#lists.isEmpty(exercicios)}" style="color: var(--text-muted); width: 100%; text-align: center; padding: 20px;">
        Nenhum exercício em PDF disponível para este tópico de momento.
    </p>
</div>
            </section>
        </main>

        <aside class="right-sidebar-padrao" style="width: 300px; padding: 20px; flex-shrink: 0;">
            <div class="profile-card-mini" style="text-align: center; background: white; border-radius: 20px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
                <h3 style="margin-top: 10px; margin-bottom: 15px;" th:text="${usuario.nome}">Rebwka</h3>
                <span class="badge" style="background: #f0f0f0; padding: 5px 10px; border-radius: 15px; font-size: 14px; font-weight: 500; color: #666;">Estudante</span>
            </div>
        </aside>
    </div>
</body>
</html>
