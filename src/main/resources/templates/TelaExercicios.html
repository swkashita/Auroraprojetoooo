<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurora - Exercícios</title>

    <link rel="stylesheet" href="TelaExercicios.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="dashboard-container">
        <aside class="sidebar-main">
            <div class="logo-section">
                <div class="icon-wrapper">
                    <i class="fas fa-graduation-cap" aria-hidden="true"></i>
                </div>
            </div>
            <nav class="nav-menu">
                <a href="/inicio" class="nav-item"><i class="fas fa-th-large"></i> Início</a>
                <a href="/disciplinas" class="nav-item"><i class="fas fa-book"></i> Disciplinas</a>
                <a href="/exercicios" class="nav-item active"><i class="fas fa-edit"></i> Exercícios</a>
                <a href="/provas" class="nav-item"><i class="fas fa-file-alt"></i> Provas anteriores</a>
                <a href="/material" class="nav-item"><i class="fas fa-plus-circle"></i> Material extra</a>
                <a href="/perfil" class="nav-item"><i class="fas fa-user"></i> Perfil</a>
                <div class="spacer"></div>
                <a href="/login" class="nav-item logout"><i class="fas fa-sign-out-alt"></i> Sair</a>
            </nav>
        </aside>

    <!-- Conteúdo principal -->
    <main class="main-layout">

       <header class="header-top">

    <div class="search-global">
        <input type="text" placeholder="Pesquisar exercícios...">
    </div>

    <div class="user-profile">
        <img src="https://via.placeholder.com/40"
             alt="Avatar"
             class="avatar">

        <span th:text="${usuario.nome}"></span>
    </div>

</header>
        <section class="content-body">
            <h1>Exercícios</h1>

            <div class="exercise-list">
                <div class="exercise-bar">
                    <span>ENEM - Matemática</span>
                    <span>50</span>
                </div>

                <div class="exercise-bar">
                    <span>ENEM - Português</span>
                    <span>25</span>
                </div>

                <div class="exercise-bar">
                    <span>UERJ - Português</span>
                    <span>75</span>
                </div>
            </div>
        </section>

    </main>

</div>
</body>
</html>
