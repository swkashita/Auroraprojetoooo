<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurora - Aulas</title>
    <link rel="stylesheet" href="/TelaDisciplinas.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Estilos específicos da listagem de vídeos mantendo harmonia com o layout */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            width: 100%;
            margin-top: 20px;
        }
        .video-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            border: 1px solid #eaeaea;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .video-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(109, 57, 207, 0.1);
        }
        .thumb-container {
            background: #f0ebff;
            height: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            color: #6d39cf;
            font-size: 32px;
        }
        .subject-tag {
            position: absolute;
            top: 12px;
            left: 12px;
            background: linear-gradient(135deg, #8C52FF 0%, #5E17EB 100%);
            color: white;
            padding: 4px 10px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 600;
        }
        .video-meta {
            padding: 15px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }
        .video-meta h4 {
            font-size: 14px;
            font-weight: 600;
            color: #111;
            margin: 0 0 8px 0;
        }
        .card-description {
            font-size: 12px;
            color: #666;
            margin: 0 0 15px 0;
            line-height: 1.4;
            flex-grow: 1;
        }
        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
        }
        .level-tag {
            font-size: 11px;
            color: #6d39cf;
            background: #f0ebff;
            padding: 4px 8px;
            border-radius: 8px;
            font-weight: 500;
        }
        .btn-play {
            text-decoration: none;
            font-size: 12px;
            font-weight: 600;
            color: white;
            background: linear-gradient(180deg, #9b6bff 0%, #6d39cf 100%);
            padding: 6px 12px;
            border-radius: 10px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            transition: opacity 0.2s;
        }
        .btn-play:hover {
            opacity: 0.9;
        }
        .no-lessons-alert {
            background: #fafafa;
            border: 1px dashed #eaeaea;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            color: #777;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar-main">
            <div class="logo-section">
                <div class="icon-wrapper">
                    <i class="fas fa-graduation-cap" aria-hidden="true"></i>
                </div>
            </div>
            <nav class="nav-menu">
                <a th:href="@{/inicio}" class="nav-item"><i class="fas fa-th-large"></i> Início</a>
                <a th:href="@{/disciplinas}" class="nav-item active"><i class="fas fa-book"></i> Disciplinas</a>
                <a th:href="@{/exercicios}" class="nav-item"><i class="fas fa-edit"></i> Exercícios</a>
                <a th:href="@{/provas}" class="nav-item"><i class="fas fa-file-alt"></i> Provas anteriores</a>
                <a th:href="@{/material}" class="nav-item"><i class="fas fa-plus-circle"></i> Material extra</a>
                <a th:href="@{/perfil}" class="nav-item"><i class="fas fa-user"></i> Perfil</a>
                <div class="spacer"></div>

                <div class="sidebar-footer-actions">
                    <a th:href="@{/logout}" class="footer-item">
                        <i class="fas fa-sign-out-alt"></i> Sair
                    </a>
                    <a th:href="@{/login-admin}" class="admin-gear-btn">
                        <i class="fas fa-cog"></i>
                    </a>
                </div>
            </nav>
        </aside>

        <main class="main-layout">
            <header class="header-top">
                <div class="search-global">
                    <input type="text" placeholder="Pesquisar">
                </div>
            </header>

            <section class="content-body">
                <h1 class="title-page" th:text="${tituloTopico != null ? tituloTopico : 'Aulas Disponíveis'}">Aulas Disponíveis</h1>
                
                <div class="no-lessons-alert" th:if="${#lists.isEmpty(aulas)}">
                    <i class="fas fa-info-circle" style="font-size: 24px; color: #6d39cf; margin-bottom: 10px;"></i>
                    <p>Nenhuma aula postada para este assunto ainda.</p>
                </div>

                <div class="video-grid" th:unless="${#lists.isEmpty(aulas)}">
                    <div class="video-card" th:each="aula : ${aulas}">
                        <div class="thumb-container">
                            <div class="subject-tag">Vestibular</div>
                            <i class="fas fa-play play-center-icon"></i>
                        </div>
                        <div class="video-meta">
                            <h4 th:text="${aula.titulo}">Título da Aula</h4>
                            <p class="card-description" th:text="${aula.descricao}">Descrição da aula</p>
                            <div class="card-footer">
                                <span class="level-tag" th:text="${aula.nivel}">Módulo</span>
                                <a th:href="@{/assistir/{id}(id=${aula.id})}" class="btn-play">
                                    Assistir <i class="fas fa-play-circle"></i>
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </main>

        <aside class="right-sidebar-padrao" style="width: 300px; padding: 20px;">
            <div class="profile-card-mini" style="text-align: center; background: white; border-radius: 20px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid #eaeaea;">
                <h3 style="margin-top: 10px; margin-bottom: 15px;" th:text="${session.usuario != null ? session.usuario.nome : 'Estudante'}">Estudante</h3>
                <span class="badge" style="background: #f0ebff; color: #6d39cf; padding: 5px 12px; border-radius: 15px; font-weight: 600; font-size: 12px;">Estudante</span>
            </div>
        </aside>
    </div>
</body>
</html>
