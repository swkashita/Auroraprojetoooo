<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurora - Aulas</title>
    <link rel="stylesheet" href="/TelaAulas.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div class="dashboard-container">
    <aside class="sidebar-main">
        <div class="logo-section">
            <div class="icon-wrapper"><i class="fas fa-graduation-cap"></i></div>
        </div>
        <nav class="nav-menu">
            <a href="/inicio" class="nav-item"><i class="fas fa-th-large"></i> Início</a>
            <a href="/disciplinas" class="nav-item active"><i class="fas fa-book"></i> Disciplinas</a>
            <a href="/exercicios" class="nav-item"><i class="fas fa-edit"></i> Exercícios</a>
            <a href="/provas" class="nav-item"><i class="fas fa-file-alt"></i> Provas anteriores</a>
            <a href="/material" class="nav-item"><i class="fas fa-plus-circle"></i> Material extra</a>
            <a href="/perfil" class="nav-item"><i class="fas fa-user"></i> Perfil</a>
            <div class="spacer"></div>
            <a href="/logout" class="nav-item logout"><i class="fas fa-sign-out-alt"></i> Sair</a>
        </nav>
    </aside>

    <main class="main-layout">
        <header class="header-top">
            <div class="search-global">
                <input type="text" placeholder="Buscar aula específica...">
            </div>
        </header>

        <section class="disciplina-info">
            <h1>AULAS DISPONÍVEIS</h1>
            <p>Selecione uma aula para começar a estudar</p>
        </section>

       <div class="video-grid">
    <div class="video-card" th:each="aula : ${aulas}">
        <div class="thumb-container">
            <iframe th:if="${aula.urlLink != null}"
                    width="100%" 
                    height="220" 
                    th:src="${aula.urlLink}" 
                    frameborder="0" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                    referrerpolicy="strict-origin-when-cross-origin"
                    allowfullscreen>
            </iframe>
            
            <div th:unless="${aula.urlLink != null}" style="height:220px; background:#ddd; display:flex; align-items:center; justify-content:center;">
                <i class="fas fa-video-slash"></i>
            </div>
        </div>

        <div class="video-meta">
            <a th:href="@{/assistir/{id}(id=${aula.id})}" style="text-decoration: none; color: inherit;">
                <h4 th:text="${aula.titulo}" style="color: #9b6bff; cursor: pointer; margin-bottom: 8px;">Título</h4>
            </a>
            
            <p th:text="${aula.descricao}">Descrição</p>
            
            <div class="status-tag" style="display: flex; justify-content: space-between; align-items: center; margin-top: 15px;">
                <span th:text="${aula.nivel}">Nível</span>
                
                <a th:href="@{/assistir/{id}(id=${aula.id})}" 
                   style="background: #9b6bff; color: white; padding: 6px 12px; border-radius: 6px; text-decoration: none; font-size: 13px; font-weight: bold;">
                   Assistir <i class="fas fa-play-circle" style="margin-left: 5px;"></i>
                </a>
            </div>
        </div>
    </div>
</div>
    </main>

    <aside class="right-column">
        <div class="profile-card">
            <div class="avatar-large">
                <img src="https://via.placeholder.com/100" alt="Avatar">
            </div>
            <h3 th:text="${usuario != null ? usuario.nome : 'Aluno'}">Aluno</h3>
            <span class="badge">Estudante</span>
        </div>

        <div class="calendar-card">
            <h4>Playlist da Disciplina</h4>
            <ul class="event-list">
                <li th:each="aula : ${aulas}">
                    <strong th:text="${aula.titulo}">Aula</strong>
                </li>
            </ul>
        </div>
    </aside>
</div>
</body>
</html>
