<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Exercícios</title>
    <link rel="stylesheet" href="layout-estudo.css">
</head>
<body>

    <div class="dashboard-container">
        <aside class="sidebar-lateral">
            <div class="logo-area">
                <div class="cap-wrapper">🎓</div>
            </div>

            <nav class="nav-links">
                <a href="#" class="nav-item"><span class="icon-box"></span> Início</a>
                <a href="#" class="nav-item"><span class="icon-box"></span> Disciplinas</a>
                <a href="#" class="nav-item active"><span class="icon-box"></span> Exercícios</a>
                <a href="#" class="nav-item"><span class="icon-box"></span> Provas anteriores</a>
                <a href="#" class="nav-item"><span class="icon-box"></span> Material extra</a>
                <a href="#" class="nav-item"><span class="icon-box"></span> Perfil</a>
            </nav>

            <button class="btn-sair"><span class="icon-box"></span> Sair</button>
        </aside>

        <main class="main-content">
            <header class="header-top">
                <input type="text" placeholder="Pesquisar" class="input-busca">
                
                <div class="perfil-info">
                    <div class="texto-usuario">
                        <strong class="nome">Eduardo Costa</strong>
                        <span class="status">Online</span>
                    </div>
                    <img src="https://i.pravatar.cc/100?u=edu" alt="Eduardo" class="foto-perfil">
                    <div class="acoes-top">
                        <button class="btn-icon">🔔</button>
                        <button class="btn-icon">⚙️</button>
                    </div>
                </div>
            </header>

            <h1 class="titulo-secao">Exercícios</h1>

            <div class="grid-exercicios">
                <button class="card-exercicio">
                    <span class="tema">ENEM - MATEMÁTICA</span>
                    <span class="valor">50</span>
                </button>

                <button class="card-exercicio">
                    <span class="tema">ENEM - PORTUGUÊS</span>
                    <span class="valor">25</span>
                </button>

                <button class="card-exercicio">
                    <span class="tema">UERJ - PORTUGUÊS</span>
                    <span class="valor">75</span>
                </button>

                <button class="card-exercicio">
                    <span class="tema">ENEM - PORTUGUÊS</span>
                    <span class="valor">36</span>
                </button>

                <button class="card-exercicio">
                    <span class="tema">ENEM - PORTUGUÊS</span>
                    <span class="valor">10</span>
                </button>

                <button class="card-exercicio">
                    <span class="tema">ENEM - PORTUGUÊS</span>
                    <span class="valor">85</span>
                </button>
            </div>
        </main>
    </div>

</body>
</html>
