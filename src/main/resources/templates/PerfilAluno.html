<!DOCTYPE html>
<html lang="pt-br"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Aurora - Perfil do Aluno</title>

    <link rel="stylesheet" href="estilo-perfil.css">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

<div class="dashboard-container">

    <aside class="sidebar-main">

        <div class="logo-section">

            <div class="icon-wrapper">

                <i class="fas fa-graduation-cap"></i>

            </div>

        </div>



        <nav class="nav-menu">

            <a href="/inicio"
               class="nav-item">

                <i class="fas fa-th-large"></i>
                Início

            </a>


            <a href="/disciplinas"
               class="nav-item">

                <i class="fas fa-book"></i>
                Disciplinas

            </a>


            <a href="/exercicios"
               class="nav-item">

                <i class="fas fa-edit"></i>
                Exercícios

            </a>


            <a href="/provas"
               class="nav-item">

                <i class="fas fa-file-alt"></i>
                Provas anteriores

            </a>


            <a href="/material"
               class="nav-item">

                <i class="fas fa-plus-circle"></i>
                Material extra

            </a>


            <a href="/perfil"
               class="nav-item active">

                <i class="fas fa-user"></i>
                Perfil

            </a>


            <div class="spacer"></div>


            <a href="/logout"
               class="nav-item logout">

                <i class="fas fa-sign-out-alt"></i>
                Sair

            </a>

        </nav>

    </aside>



    <main class="main-layout">

        <header class="header-top">

            <div class="search-global">

                <input type="text"
                       placeholder="Pesquisar">

            </div>

        </header>



        <div class="dashboard-content">


            <form action="/salvarPerfil"
                  method="POST"
                  class="info-card-perfil">


                <div class="card-header">

                    <div class="title-group">

                        <h3>Informações pessoais</h3>

                        <p>
                            Em caso de dados desatualizados,
                            corrija-os aqui
                        </p>

                    </div>


                    <button type="submit"
                            class="btn-save">

                        SALVAR

                    </button>

                </div>



                <div class="form-grid">


                    <div class="input-wrap">

                        <label for="edit-nome">
                            Nome completo
                        </label>

                        <input type="text"
                               name="nome"
                               id="edit-nome"
                               placeholder="Digite seu nome..."
                               th:value="${usuario.nome}">

                    </div>



                    <div class="input-wrap">

                        <label for="edit-curso">
                            Curso Pretendido
                        </label>

                        <input type="text"
                               name="curso"
                               id="edit-curso"
                               placeholder="Ex: Educação Física"
                               th:value="${usuario.curso}">

                    </div>



                    <div class="input-wrap">

                        <label for="edit-email">
                            Email
                        </label>

                        <input type="email"
                               name="email"
                               id="edit-email"
                               placeholder="seu@email.com"
                               th:value="${usuario.email}">

                    </div>



                    <div class="input-wrap">

                        <label for="edit-cidade">
                            Cidade
                        </label>

                        <input type="text"
                               name="cidade"
                               id="edit-cidade"
                               placeholder="Sua cidade"
                               th:value="${usuario.cidade}">

                    </div>



                    <div class="input-wrap">

                        <label for="edit-tel">
                            Telefone
                        </label>

                        <input type="text"
                               name="telefone"
                               id="edit-tel"
                               placeholder="(00) 00000-0000"
                               th:value="${usuario.telefone}">

                    </div>

                </div>

            </form>



            <div class="info-card-perfil">

                <div class="card-header">

                    <h3>Resumo do Aluno</h3>

                </div>



                <div class="display-grid">


                    <div class="info-cell">

                        <strong>Nome</strong>

                        <p id="display-nome"
                           th:text="${usuario.nome}">
                        </p>

                    </div>



                    <div class="info-cell">

                        <strong>Curso</strong>

                        <p id="display-curso"
                           th:text="${usuario.curso}">
                        </p>

                    </div>



                    <div class="info-cell">

                        <strong>Email</strong>

                        <p id="display-email"
                           th:text="${usuario.email}">
                        </p>

                    </div>



                    <div class="info-cell">

                        <strong>ID</strong>

                        <p th:text="${usuario.id}">
                        </p>

                    </div>

                </div>

            </div>

        </div>

    </main>



    <aside class="right-column">

        <div class="profile-card">

            <div class="avatar-large">

                <img src="https://via.placeholder.com/100"
                     alt="Foto de Perfil">

            </div>


            <h3 id="side-name"
                th:text="${usuario.nome}">
            </h3>


            <span class="badge">
                Estudante
            </span>

        </div>



        <div class="location-card">

            <h4>

                Localização

                <i class="fas fa-map-marker-alt"></i>

            </h4>


            <div class="location-input"
                 id="side-city"
                 th:text="${usuario.cidade}">

            </div>

        </div>



        <div class="calendar-card">

            <h4>Calendário</h4>

            <ul class="event-list">

                <li>
                    <strong>01/10</strong>
                    - Inscrições ENEM
                </li>

                <li>
                    <strong>09/11</strong>
                    - ENEM
                </li>

            </ul>

        </div>

    </aside>

</div>

</body>

</html>
