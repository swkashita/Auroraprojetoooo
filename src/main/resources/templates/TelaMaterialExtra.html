<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org"></html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurora - Material Extra</title>
    <link rel="stylesheet" href="TelaMaterialExtra.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar-main">
            <div class="logo-section">
                <div class="icon-wrapper">
                    <i class="fas fa-graduation-cap" aria-hidden="true"></i>
                </div>
            </div>
            <nav class="nav-menu">
                <a href="/inicio" class="nav-item"><i class="fas fa-th-large"></i> Início</a>
                <a href="/disciplinas" class="nav-item"><i class="fas fa-book"></i> Disciplinas</a>
                <a href="/exercicios" class="nav-item"><i class="fas fa-edit"></i> Exercícios</a>
                <a href="/provas" class="nav-item"><i class="fas fa-file-alt"></i> Provas anteriores</a>
                <a href="/material" class="nav-item active"><i class="fas fa-plus-circle"></i> Material extra</a>
                <a href="/perfil" class="nav-item"><i class="fas fa-user"></i> Perfil</a>
                <div class="spacer"></div>
                <a href="/login" class="nav-item logout"><i class="fas fa-sign-out-alt"></i> Sair</a>
            </nav>
        </aside>

        <main class="main-layout">
            <header class="header-top">
                <div class="search-global">
                    <input type="text" placeholder="Pesquisar livros, PDFs ou resumos">
                </div>
            </header>

            <section class="content-body">
                <h1 class="title-page">Material Extra</h1>
                
                <div class="categorias-extras">
                    <button type="button" class="cat-button">Resumos em PDF</button>
                    <button type="button" class="cat-button">Mapas Mentais</button>
                    <button type="button" class="cat-button">E-books Recomendados</button>
                    <button type="button" class="cat-button">Formulários</button>
                </div>

                <h2 class="sub-title">Adicionados recentemente</h2>
                <div class="material-grid">
                    <div class="book-card">
                        <div class="book-cover"><i class="fas fa-book-open"></i></div>
                        <div class="book-info">
                            <h4>Fórmulas de Física</h4>
                            <span>PDF - 12MB</span>
                        </div>
                    </div>
                    <div class="book-card">
                        <div class="book-cover"><i class="fas fa-brain"></i></div>
                        <div class="book-info">
                            <h4>Mapa Mental: Brasil Colônia</h4>
                            <span>PNG - 5MB</span>
                        </div>
                    </div>
                </div>
            </section>
        </main>

        
        <aside class="right-sidebar-padrao" style="width: 300px; padding: 20px;">
            <div class="profile-card-mini" style="text-align: center; background: white; border-radius: 20px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05);">
                <h3 style="margin-top: 10px; margin-bottom: 15px;" th:text="${usuario.nome}"></h3>
                <span class="badge" style="background: #f0f0f0; padding: 5px 10px; border-radius: 15px; font-size: 0.8rem;">Estudante</span>
            </div>
            
            <div class="calendar-mini" style="margin-top: 20px; background: white; border-radius: 20px; padding: 20px;">
                <h4 style="margin-bottom: 10px;">Calendário</h4>
                <p style="font-size: 0.85rem; border-bottom: 1px solid #eee; padding: 5px 0;"><ul class="admin-list">
        <li th:each="ev : ${eventos}">
            <i class="fas fa-calendar-check"></i>
            <strong th:text="${ev.data}">00/00</strong> - 
            <span th:text="${ev.descricao}">Descrição</span>
        </li>
        
        <li th:if="${#lists.isEmpty(eventos)}">
            <i style="margin-top: 10px;" class="fas fa-info-circle"></i> Nenhuma prova agendada.
        </li>
    </ul></p>
            </div>
        </aside>
    </div>
</body>
</html>
