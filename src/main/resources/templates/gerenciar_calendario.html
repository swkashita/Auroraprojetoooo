<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurora Admin - Calendário</title>
    <link rel="stylesheet" href="/AdminStyle.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div class="dashboard-container">
    <aside class="sidebar-main">
        <div class="logo-section">
            <div class="icon-wrapper"><i class="fas fa-user-shield"></i></div>
        </div>
        <nav class="nav-menu">
            <a href="/admin" class="nav-item"><i class="fas fa-chart-line"></i> Painel Geral</a>
            <a href="/admin/conteudo" class="nav-item"><i class="fas fa-video"></i> Gerenciar Aulas</a>
            <a href="/admin/provas" class="nav-item"><i class="fas fa-file-upload"></i> Upload Provas</a>
            <a href="/admin/materiais" class="nav-item"><i class="fas fa-folder-plus"></i> Materiais Extras</a>
            <a href="/admin/calendario" class="nav-item active"><i class="fas fa-calendar-alt"></i> Calendário</a>
        </nav>
        <div class="spacer"></div>
        <div class="sidebar-footer-actions">
            <a href="/logout" class="footer-item"><i class="fas fa-sign-out-alt"></i> Sair</a>
        </div>
    </aside>

    <main class="main-layout">
        <header class="header-top">
            <h1>Gerenciar Calendário</h1>
            <p>Adicione ou remova datas importantes de provas e eventos.</p>
        </header>

        <section class="admin-form-section">
            <div class="video-info-box">
                <h3><i class="fas fa-plus-circle"></i> Novo Evento</h3>
                
                <form action="/admin/calendario/salvar" method="post" class="admin-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Data</label>
                            <input type="text" name="data" placeholder="Ex: 01/10" required>
                        </div>
                        <div class="form-group">
                            <label>Descrição do Evento</label>
                            <input type="text" name="descricao" placeholder="Ex: Prova da UNESP" required>
                        </div>
                    </div>
                    <button type="submit" class="btn-primary">Publicar no Calendário</button>
                </form>
            </div>

            <div class="video-info-box" style="margin-top: 30px;">
                <h3><i class="fas fa-list"></i> Datas Cadastradas</h3>
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>Data</th>
                            <th>Evento</th>
                            <th>Ação</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="ev : ${eventos}">
                            <td th:text="${ev.data}">01/10</td>
                            <td th:text="${ev.descricao}">ENEM</td>
                            <td>
                                <a th:href="@{/admin/calendario/excluir/{id}(id=${ev.id})}" class="btn-delete">
                                    <i class="fas fa-trash"></i>
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <aside class="right-column">
        <div class="profile-card">
            <h3>Super Admin</h3>
            <span class="badge">Acesso Total</span>
        </div>
    </aside>
</div>

</body>
</html>
