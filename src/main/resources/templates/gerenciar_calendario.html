<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurora Admin - Calendário</title>

    <link rel="stylesheet" href="/TelaDisciplinas.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Estrutura de colunas alinhada com o padrão do projeto admin */
        .admin-layout-grid {
            display: flex;
            gap: 30px;
            width: 100%;
            align-items: flex-start;
        }

        .admin-form-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .admin-box-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            border: 1px solid #eaeaea;
        }

        .admin-aside-panel {
            width: 300px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .admin-card-box {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            border: 1px solid #eaeaea;
        }

        .form-group-admin {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 18px;
        }

        .form-group-admin label {
            font-size: 13px;
            font-weight: 600;
            color: #555;
        }

        .form-group-admin input {
            padding: 12px 15px;
            border: 1px solid #eaeaea;
            border-radius: 12px;
            font-size: 14px;
            background: #fafafa;
            color: #333;
            font-family: inherit;
            transition: all 0.2s;
            width: 100%;
        }

        .form-group-admin input:focus {
            outline: none;
            border-color: #6d39cf;
            background: white;
            box-shadow: 0 0 0 3px rgba(109, 57, 207, 0.05);
        }

        .form-row-admin {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 15px;
        }

        .btn-submit-admin {
            background: linear-gradient(180deg, #9b6bff 0%, #6d39cf 100%);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 15px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 12px rgba(109, 57, 207, 0.15);
        }

        .btn-submit-admin:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(109, 57, 207, 0.25);
        }

        /* Estrutura da Tabela de Eventos */
        .admin-table-list {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        .admin-table-list th {
            text-align: left;
            font-size: 13px;
            font-weight: 600;
            color: #777;
            padding-bottom: 12px;
            border-bottom: 2px solid #f5f5f5;
        }

        .admin-table-list td {
            padding: 14px 0;
            font-size: 14px;
            color: #333;
            border-bottom: 1px dashed #eaeaea;
            vertical-align: middle;
        }

        .admin-table-list tr:last-child td {
            border-bottom: none;
        }

        .btn-delete-mini {
            color: #ef4444;
            background: #fee2e2;
            border: none;
            width: 34px;
            height: 34px;
            border-radius: 8px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-delete-mini:hover {
            background: #ef4444;
            color: white;
            transform: scale(1.05);
        }

        .empty-state {
            padding: 20px 0;
            text-align: center;
            color: #aaa;
            font-style: italic;
            font-size: 13px;
        }
    </style>
</head>
<body>

<div class="dashboard-container">
    
    <aside class="sidebar-main">
        <div class="logo-section">
            <div class="icon-wrapper">
                <i class="fas fa-graduation-cap"></i>
            </div>
        </div>
        <nav class="nav-menu">
            <a th:href="@{/admin}" class="nav-item">
                <i class="fas fa-chart-line"></i> Upload Aulas
            </a>
            <a th:href="@{/admin/conteudo}" class="nav-item">
                <i class="fas fa-video"></i> Gerenciar Aulas
            </a>
            <a th:href="@{/admin/exercicios}" class="nav-item">
                <i class="fas fa-edit"></i> Upload Exercícios
            </a>
            <a th:href="@{/admin/provas}" class="nav-item">
                <i class="fas fa-file-upload"></i> Upload Provas
            </a>
            <a th:href="@{/admin/materiais}" class="nav-item">
                <i class="fas fa-folder-plus"></i> Materiais Extras
            </a>
            <a th:href="@{/admin/calendario}" class="nav-item active">
                <i class="fas fa-calendar-alt"></i> Gerenciar Calendário
            </a>
            <a th:href="@{/admin/mural}" class="nav-item">
                <i class="fas fa-bullhorn"></i> Mural de Avisos
            </a>
        </nav>
        <div class="spacer"></div>
        <div class="sidebar-footer-actions">
            <a th:href="@{/inicio}" class="footer-item">
                <i class="fas fa-sign-out-alt"></i> Sair
            </a>
            <a th:href="@{/admin}" class="admin-gear-btn" style="color: #6d39cf;">
                <i class="fas fa-cog"></i>
            </a>
        </div>
    </aside>

    <main class="main-layout">
        <header class="header-top">
            <div class="search-global">
                <input type="text" placeholder="Painel de Controle - Coordenação Aurora" disabled style="background: transparent; border: none; cursor: default;">
            </div>
        </header>

        <h1 class="title-page">Gerenciar Calendário</h1>

        <div class="admin-layout-grid">
            
            <div class="admin-form-container">
                
                <div class="admin-box-card">
                    <h3 style="margin: 0 0 20px 0; font-size: 16px; font-weight: 600; color: #111;">
                        <i class="fas fa-plus-circle" style="color: #6d39cf; margin-right: 5px;"></i> Novo Evento Cronograma
                    </h3>
                    
                    <form th:action="@{/admin/calendario/salvar}" method="post" class="admin-form">
                        <div class="form-row-admin">
                            <div class="form-group-admin">
                                <label>Data</label>
                                <input type="text" name="data" placeholder="Ex: 01/10" required autocomplete="off">
                            </div>
                            <div class="form-group-admin">
                                <label>Descrição do Evento</label>
                                <input type="text" name="descricao" placeholder="Ex: Prova da UNESP" required autocomplete="off">
                            </div>
                        </div>
                        <button type="submit" class="btn-submit-admin">Publicar no Calendário</button>
                    </form>
                </div>

                <div class="admin-box-card">
                    <h3 style="margin: 0 0 20px 0; font-size: 16px; font-weight: 600; color: #111;">
                        <i class="fas fa-list" style="color: #6d39cf; margin-right: 5px;"></i> Datas Cadastradas
                    </h3>
                    
                    <table class="admin-table-list">
                        <thead>
                            <tr>
                                <th style="width: 100px;">Data</th>
                                <th>Evento</th>
                                <th style="text-align: center; width: 60px;">Ação</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="ev : ${eventos}">
                                <td th:text="${ev.data}" style="font-weight: 600; color: #6d39cf;">01/10</td>
                                <td th:text="${ev.descricao}">ENEM</td>
                                <td style="text-align: center;">
                                    <a th:href="@{'/admin/calendario/excluir/' + ${ev.id}}" onclick="return confirm('Remover este evento do calendário?')">
                                        <button type="button" class="btn-delete-mini" title="Excluir Evento">
                                            <i class="fas fa-trash"></i>
                                        </button>
                                    </a>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(eventos)}">
                                <td colspan="3" class="empty-state">
                                    Nenhum evento agendado no calendário.
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

            </div>

            <div class="admin-aside-panel">
                <div class="admin-card-box" style="text-align: center;">
                    <div style="font-size: 32px; color: #6d39cf; margin-bottom: 8px;">
                        <i class="fas fa-user-shield"></i>
                    </div>
                    <h3 style="margin: 0 0 5px 0; font-size: 15px; color: #111;">Super Admin</h3>
                    <span class="badge" style="background: #eaddff; color: #6d39cf; padding: 4px 12px; border-radius: 15px; font-size: 11px; font-weight: 600;">Acesso Total</span>
                </div>
            </div>

        </div>
    </main>
</div>

</body>
</html>
