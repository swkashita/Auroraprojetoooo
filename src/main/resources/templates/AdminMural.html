<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurora Admin - Mural de Avisos</title>
    <link rel="stylesheet" href="/TelaDisciplinas.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .admin-layout-grid {
            display: flex;
            gap: 30px;
            width: 100%;
            align-items: flex-start;
        }
        .admin-form-container {
            flex: 1;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            border: 1px solid #eaeaea;
        }
        .form-group-admin {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 18px;
        }
        .form-group-admin label {
            font-size: 13px;
            font-weight: 600;
            color: #555;
        }
        .form-group-admin input, 
        .form-group-admin textarea {
            padding: 12px 15px;
            border: 1px solid #eaeaea;
            border-radius: 12px;
            font-size: 14px;
            background: #fafafa;
            color: #333;
            width: 100%;
            font-family: inherit;
        }
        .btn-submit-admin {
            background: linear-gradient(180deg, #9b6bff 0%, #6d39cf 100%);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 15px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s;
        }
        .btn-submit-admin:hover {
            transform: translateY(-2px);
        }
        .aviso-card {
            background: #fdfdfd;
            border: 1px solid #eaeaea;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .btn-excluir {
            color: #ef4444;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <aside class="sidebar-main">
            <div class="logo-section">
                <div class="icon-wrapper"><i class="fas fa-graduation-cap"></i></div>
            </div>
            <nav class="nav-menu">
                <a th:href="@{/admin}" class="nav-item"><i class="fas fa-chart-line"></i> Upload Aulas</a>
                <a th:href="@{/admin/exercicios}" class="nav-item"><i class="fas fa-edit"></i> Upload Exercícios</a>
                <a th:href="@{/admin/provas}" class="nav-item"><i class="fas fa-file-upload"></i> Upload Provas</a>
                <a th:href="@{/admin/materiais}" class="nav-item"><i class="fas fa-folder-plus"></i> Materiais Extras</a>
                <a th:href="@{/admin/calendario}" class="nav-item"><i class="fas fa-calendar-alt"></i> Gerenciar Calendário</a>
                <a th:href="@{/admin/mural}" class="nav-item active"><i class="fas fa-bullhorn"></i> Mural de Avisos</a>
                <a th:href="@{/admin/conteudo}" class="nav-item"><i class="fas fa-video"></i> Gerenciar Tudo</a>
            </nav>
            <div class="spacer"></div>
            <div class="sidebar-footer-actions">
                <a th:href="@{/inicio}" class="footer-item"><i class="fas fa-sign-out-alt"></i> Sair</a>
            </div>
        </aside>

        <main class="main-layout">
            <header class="header-top">
                <div class="search-global">
                    <input type="text" placeholder="Painel de Controle - Mural de Avisos" disabled style="background: transparent; border: none;">
                </div>
            </header>

            <h1 class="title-page">Mural de Avisos Dinâmico</h1>

            <div class="admin-layout-grid">
                <div class="admin-form-container">
                    <h3 style="margin-top:0;">Novo Comunicado</h3>
                    <form th:action="@{/admin/mural/salvar}" method="post">
                        <div class="form-group-admin">
                            <label>Título do Aviso</label>
                            <input type="text" name="titulo" placeholder="Ex: Horário do Simulado" required autocomplete="off">
                        </div>
                        <div class="form-group-admin">
                            <label>Conteúdo / Mensagem</label>
                            <textarea name="conteudo" rows="4" placeholder="Digite o aviso completo para os estudantes..." required></textarea>
                        </div>
                        <button type="submit" class="btn-submit-admin">Publicar no Mural</button>
                    </form>
                </div>

                <div class="admin-form-container" style="flex: 1.2;">
                    <h3 style="margin-top:0;">Avisos Publicados</h3>
                    <div th:each="aviso : ${avisos}" class="aviso-card">
                        <div>
                            <strong th:text="${aviso.titulo}" style="color: #6d39cf; display:block; font-size:16px;">Título</strong>
                            <p th:text="${aviso.conteudo}" style="margin: 5px 0 0 0; color:#555; font-size:14px;">Conteúdo do aviso...</p>
                        </div>
                        <a th:href="@{/admin/mural/excluir/{id}(id=${aviso.id})}" class="btn-excluir" onclick="return confirm('Deseja mesmo remover este aviso?')">
                            <i class="fas fa-trash-alt"></i>
                        </a>
                    </div>
                    <div th:if="${#lists.isEmpty(avisos)}" style="text-align:center; color:#aaa; font-style:italic; padding:20px;">
                        Nenhum aviso publicado no momento.
                    </div>
                </div>
            </div>
        </main>
    </div>

</body>
</html>
