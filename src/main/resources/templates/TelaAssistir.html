<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurora - Assistindo Aula</title>
    <link rel="stylesheet" href="/TelaDisciplinas.css">
    <link rel="stylesheet" href="/TelaAssistir.css"> 
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Ajustes específicos para a harmonia da tela de exibição de vídeo */
        .video-wrapper {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }
        .video-wrapper iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .video-info-box {
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            border: 1px solid #eaeaea;
        }
        .playlist-items {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 15px;
        }
        .playlist-item {
            background: white;
            padding: 15px;
            border-radius: 15px;
            border: 1px solid #eaeaea;
            transition: all 0.2s ease;
        }
        .playlist-item:hover {
            border-color: #9b6bff;
            background: #fdfbff;
        }
        .playlist-item.active-item {
            border-color: #6d39cf;
            background: #f0ebff;
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
    <aside class="sidebar-main">
            <div class="logo-section">
                <div class="icon-wrapper"><i class="fas fa-graduation-cap" aria-hidden="true"></i></div>
            </div>
            <nav class="nav-menu">
                <a th:href="@{/inicio}" class="nav-item"><i class="fas fa-th-large"></i> Início</a>
                <a th:href="@{/disciplinas}" class="nav-item active"><i class="fas fa-book"></i> Disciplinas</a>
                <a th:href="@{/exercicios}" class="nav-item"><i class="fas fa-edit"></i> Exercícios</a>
                <a th:href="@{/provas}" class="nav-item"><i class="fas fa-file-alt"></i> Provas anteriores</a>
                <a th:href="@{/material}" class="nav-item"><i class="fas fa-plus-circle"></i> Material extra</a>
                <a th:href="@{/perfil}" class="nav-item"><i class="fas fa-user"></i> Perfil</a>
                
                <div class="spacer"></div>
                
                <div class="sidebar-footer-actions">
                    <a th:href="@{/logout}" class="footer-item">
                        <i class="fas fa-sign-out-alt"></i> Sair
                    </a>
                    <a th:href="@{/login-admin}" class="admin-gear-btn">
                        <i class="fas fa-cog"></i>
                    </a>
                </div>
            </nav>
        </aside>
        <main class="main-layout">
            <header class="header-top">
                <div style="margin-bottom: 0;">
                    <a href="javascript:history.back()" style="text-decoration: none; color: #6d39cf; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; font-size: 14px;">
                        <i class="fas fa-arrow-left"></i> Voltar para a lista
                    </a>
                </div>
            </header>

            <section class="content-body" style="margin-top: 20px;">
                <div class="video-wrapper">
                    <iframe th:src="${aula.urlLink}" allowfullscreen></iframe>
                </div>
                
                <div class="video-info-box">
                    <h1 th:text="${aula.titulo}" style="font-size: 20px; color: #111; margin: 0; font-weight: 700;">Título da Aula</h1>
                    <p th:text="${aula.descricao}" style="color: #666; margin-top: 10px; margin-bottom: 0; font-size: 14px; line-height: 1.5;">
                        Descrição da aula...
                    </p>
                </div>
            </section>
        </main>

        <aside class="right-sidebar-padrao" style="width: 300px; padding: 20px;">
            <div class="profile-card-mini" style="margin-bottom: 20px; text-align: center; background: white; border-radius: 20px; padding: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid #eaeaea;">
                <h3 style="margin: 5px 0; font-size: 15px;" th:text="${session.usuario != null ? session.usuario.nome : 'Estudante'}">Estudante</h3>
            </div>

            <h3 style="margin-bottom: 10px; color: #333; font-size: 14px; font-weight: 700; padding-left: 5px;">
                <i class="fas fa-list-ul" style="color: #6d39cf; margin-right: 5px;"></i> Conteúdos Relacionados
            </h3>
            
            <div class="playlist-items">
                <div class="playlist-item active-item">
                    <strong th:text="${aula.titulo}" style="font-size: 13px; color: #111; display: block;">Título</strong>
                    <span style="display:block; font-size: 11px; color: #6d39cf; font-weight: 600; margin-top: 4px;">
                        <i class="fas fa-play-circle"></i> Assistindo agora
                    </span>
                </div>
            </div>
        </aside>
    </div>

</body>
</html>
