<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurora Admin - Upload Aulas</title>

    <link rel="stylesheet" href="/TelaDisciplinas.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Estrutura de colunas alinhada com o padrão do projeto admin */
        .admin-layout-grid {
            display: flex;
            gap: 30px;
            width: 100%;
            align-items: flex-start;
        }

        .admin-form-container {
            flex: 1;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            border: 1px solid #eaeaea;
        }

        .admin-aside-panel {
            width: 300px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .admin-card-box {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            border: 1px solid #eaeaea;
        }

        .form-group-admin {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 18px;
        }

        .form-group-admin label {
            font-size: 13px;
            font-weight: 600;
            color: #555;
        }

        .form-group-admin input, 
        .form-group-admin textarea,
        .form-group-admin select {
            padding: 12px 15px;
            border: 1px solid #eaeaea;
            border-radius: 12px;
            font-size: 14px;
            background: #fafafa;
            color: #333;
            font-family: inherit;
            transition: all 0.2s;
            width: 100%;
        }

        .form-group-admin input:focus, 
        .form-group-admin textarea:focus,
        .form-group-admin select:focus {
            outline: none;
            border-color: #6d39cf;
            background: white;
            box-shadow: 0 0 0 3px rgba(109, 57, 207, 0.05);
        }

        .form-row-admin {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .btn-submit-admin {
            background: linear-gradient(180deg, #9b6bff 0%, #6d39cf 100%);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 15px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 12px rgba(109, 57, 207, 0.15);
        }

        .btn-submit-admin:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(109, 57, 207, 0.25);
        }

        /* Listagem de Ações / Histórico do Painel */
        .admin-list {
            list-style: none;
            padding: 0;
            margin: 10px 0 0 0;
            text-align: left;
        }

        .admin-list li {
            font-size: 13px;
            color: #444;
            padding: 10px 0;
            border-bottom: 1px dashed #eaeaea;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .admin-list li:last-child {
            border-bottom: none;
        }

        .admin-list li i {
            color: #16a34a;
        }

        .stats-badge-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
        }

        .stat-badge-box {
            background: #f0ebff;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
        }

        .stat-badge-box strong {
            font-size: 20px;
            color: #6d39cf;
            display: block;
        }

        .stat-badge-box span {
            font-size: 11px;
            color: #555;
            font-weight: 500;
        }
    </style>
</head>

<body>

    <div class="dashboard-container">

        <aside class="sidebar-main">
            <div class="logo-section">
                <div class="icon-wrapper">
                    <i class="fas fa-graduation-cap"></i>
                </div>
            </div>

            <nav class="nav-menu">
                <a href="/admin" class="nav-item active">
                    <i class="fas fa-chart-line"></i> Upload Aulas
                </a>
                <a href="/admin/conteudo" class="nav-item">
                    <i class="fas fa-video"></i> Gerenciar Aulas
                </a>
                <a href="/admin/exercicios" class="nav-item">
                    <i class="fas fa-edit"></i> Upload Exercícios
                </a>
                <a href="/admin/provas" class="nav-item">
                    <i class="fas fa-file-upload"></i> Upload Provas
                </a>
                <a href="/admin/materiais" class="nav-item">
                    <i class="fas fa-folder-plus"></i> Materiais Extras
                </a>
                <a href="/admin/calendario" class="nav-item">
                    <i class="fas fa-calendar-alt"></i> Gerenciar Calendário
                </a>
                <a href="/admin/mural" class="nav-item">
                    <i class="fas fa-bullhorn"></i> Mural de Avisos
                </a>
            </nav>

            <div class="spacer"></div>

            <div class="sidebar-footer-actions">
                <a href="/inicio" class="footer-item">
                    <i class="fas fa-sign-out-alt"></i> Sair
                </a>
                <a href="/admin" class="admin-gear-btn" style="color: #6d39cf;">
                    <i class="fas fa-cog"></i>
                </a>
            </div>
        </aside>

        <main class="main-layout">

            <header class="header-top">
                <div class="search-global">
                    <input type="text" placeholder="Painel de Controle - Coordenação Aurora" disabled style="background: transparent; border: none; cursor: default;">
                </div>
            </header>

            <h1 class="title-page">Painel de Aulas</h1>

            <div class="admin-layout-grid">
                
                <div class="admin-form-container">
                    <h3 style="margin: 0 0 20px 0; font-size: 16px; font-weight: 600; color: #111;">
                        <i class="fas fa-plus-circle" style="color: #6d39cf; margin-right: 5px;"></i> Adicionar Nova Aula
                    </h3>

                    <form action="/salvarconteudo" method="post" class="admin-form">

                        <div class="form-group-admin">
                            <label for="tituloConteudo">Título da Aula</label>
                            <input type="text" id="tituloConteudo" name="titulo" placeholder="Ex: Interpretação de Texto" required autocomplete="off">
                        </div>

                        <div class="form-row-admin">
                            <div class="form-group-admin">
                                <label>Link do YouTube / Drive</label>
                                <input type="text" name="urlLink" placeholder="https://youtube.com/embed/..." required autocomplete="off">
                            </div>

                            <div class="form-group-admin">
                                <label for="disciplina">Disciplina</label>
                                <select name="disciplina" id="disciplina" required onchange="atualizarTopicos()">
                                    <option value="">Selecione</option>
                                    <option value="MATEMATICA">Matemática</option>
                                    <option value="PORTUGUES">Português</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-group-admin">
                            <label for="nivel">Assunto / Tópico</label>
                            <select name="nivel" id="nivel" required>
                                <option value="">Selecione a disciplina primeiro...</option>
                            </select>
                        </div>

                        <div class="form-group-admin">
                            <label>Descrição</label>
                            <textarea name="descricao" rows="4" placeholder="O que o aluno aprenderá nesta aula?"></textarea>
                        </div>

                        <button type="submit" class="btn-submit-admin">
                            Publicar Conteúdo
                        </button>

                    </form>
                </div>

                <div class="admin-aside-panel">
                    
                    <div class="admin-card-box" style="text-align: center;">
                        <h3 style="margin: 0 0 5px 0; font-size: 15px; color: #111;">Super Admin</h3>
                        <span class="badge" style="background: #f0f0f0; padding: 4px 10px; border-radius: 15px; font-size: 11px; font-weight: 600; color: #666;">Acesso Total</span>
                        
                        <div class="stats-badge-container">
                            <div class="stat-badge-box">
                                <strong id="totalVideos">0</strong>
                                <span>Vídeos</span>
                            </div>
                            <div class="stat-badge-box">
                                <strong id="totalProvas">0</strong>
                                <span>Provas</span>
                            </div>
                        </div>
                    </div>

                    <div class="admin-card-box">
                        <h4 style="margin: 0 0 10px 0; font-size: 14px; color: #111; font-weight: 600;">
                            <i class="fas fa-history" style="color: #6d39cf;"></i> Últimas Ações
                        </h4>
                        <ul class="admin-list" id="listaAcoes"></ul>
                    </div>

                </div>

            </div>
        </main>
    </div>

    <script>
        const listaAcoes = document.getElementById("listaAcoes");
        const totalVideos = document.getElementById("totalVideos");
        const totalProvas = document.getElementById("totalProvas");
        const formulario = document.querySelector(".admin-form");
        const tituloConteudo = document.getElementById("tituloConteudo");

        let conteudos = JSON.parse(localStorage.getItem("conteudosAdmin")) || [];
        let acoes = JSON.parse(localStorage.getItem("acoesAdmin")) || [];

        function atualizarTopicos() {
            const disciplina = document.getElementById("disciplina").value;
            const nivelSelect = document.getElementById("nivel");
            
            nivelSelect.innerHTML = '<option value="">Selecione o assunto...</option>';
            
            const topicosMatematica = [
                "Matemática - Básica",
                "Matemática - Frações e Números Decimais",
                "Matemática - Estatística",
                "Matemática - Geometria Plana",
                "Matemática - Geometria Espacial",
                "Matemática - Funções",
                "Matemática - Analíse Combinatória e Probabilidade",
                "Matemática - Matrizes"
            ];
            
            const topicosPortugues = [
                "Português - Gêneros Textuais",
                "Português - Morfologia",
                "Português - Classes Gramaticais",
                "Português - Sintaxe",
                "Português - Linguagem",
                "Português - Interpretação de Texto",
                "Português - Escolas Literárias",
                "Português - Redação"
            ];
            
            let listaSelecionada = [];
            if (disciplina === "MATEMATICA") {
                listaSelecionada = topicosMatematica;
            } else if (disciplina === "PORTUGUES") {
                listaSelecionada = topicosPortugues;
            }
            
            listaSelecionada.forEach(function(topico) {
                const option = document.createElement("option");
                option.value = topico;
                option.text = topico;
                nivelSelect.appendChild(option);
            });
        }

        function atualizarCards() {
            const videos = conteudos.filter(item => item.tipo === "VIDEO");
            const provas = conteudos.filter(item => item.tipo === "PROVA");

            totalVideos.textContent = videos.length;
            totalProvas.textContent = provas.length;
        }

        function renderizarAcoes() {
            listaAcoes.innerHTML = "";
            acoes.forEach(acao => {
                listaAcoes.innerHTML += `
                    <li>
                        <i class="fas fa-check-circle"></i>
                        ${acao}
                    </li>
                `;
            });
        }

        function adicionarAcao(texto) {
            acoes.unshift(texto);
            if (acoes.length > 5) {
                acoes.pop();
            }
            localStorage.setItem("acoesAdmin", JSON.stringify(acoes));
            renderizarAcoes();
        }

        formulario.addEventListener("submit", function (event) {
            const titulo = tituloConteudo.value;
            const tipo = "VIDEO"; 

            conteudos.push({
                titulo: titulo,
                tipo: tipo
            });

            localStorage.setItem("conteudosAdmin", JSON.stringify(conteudos));
            adicionarAcao(`${tipo} publicado: ${titulo}`);
            atualizarCards();
        });

        atualizarCards();
        renderizarAcoes();
    </script>

</body>
</html>
