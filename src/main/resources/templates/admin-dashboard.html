<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurora Admin - Painel Geral</title>

    <link rel="stylesheet" href="/AdminStyle.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

    <div class="dashboard-container">

        <aside class="sidebar-main">

            <div class="logo-section">
                <div class="icon-wrapper">
                    <i class="fas fa-user-shield"></i>
                </div>
            </div>

            <nav class="nav-menu">
                <a href="/admin" class="nav-item active">
                    <i class="fas fa-chart-line"></i>
                    Upload Aulas
                </a>

                <a href="/admin/conteudo" class="nav-item">
                    <i class="fas fa-video"></i>
                    Gerenciar Aulas
                </a>

                <a href="/admin/provas" class="nav-item">
                    <i class="fas fa-file-upload"></i>
                    Upload Provas
                </a>

                <a href="/admin/materiais" class="nav-item">
                    <i class="fas fa-folder-plus"></i>
                    Materiais Extras
                </a>

                <a href="/admin/calendario" class="nav-item">
                    <i class="fas fa-folder-plus"></i>
                    Gerenciar Calendário
                </a>
            </nav>

            <div class="spacer"></div>

            <div class="sidebar-footer-actions">
                <a href="/logout" class="footer-item">
                    <i class="fas fa-sign-out-alt"></i>
                    Sair
                </a>
            </div>

        </aside>

        <main class="main-layout">

            <header class="header-top">
                <h1>Painel de Aulas</h1>
                <p>Olá, Admin! O que vamos gerenciar hoje?</p>
            </header>

            <section class="admin-form-section">

                <div class="video-info-box">

                    <h3>
                        <i class="fas fa-plus-circle"></i>
                        Adicionar Nova Aula
                    </h3>

                    <form action="/salvarconteudo" method="post" class="admin-form">

                        <div class="form-group">
                            <label for="tituloConteudo">Título da Aula</label>
                            <input type="text" id="tituloConteudo" name="titulo" placeholder="Ex: Interpretação de Texto" required>
                        </div>

                        <div class="form-row">

                            <div class="form-group">
                                <label>Link do YouTube </label>
                                <input type="text" name="urlLink" placeholder="https://youtube.com/embed/... / Link Drive">
                            </div>

                            <div class="form-group">
                                <label for="disciplina">Disciplina</label>
                                <select name="disciplina" id="disciplina" required onchange="atualizarTopicos()">
                                    <option value="">Selecione</option>
                                    <option value="MATEMATICA">Matemática</option>
                                    <option value="PORTUGUES">Português</option>
                                </select>
                            </div>

                        </div>

                        <div class="form-row">

                            <div class="form-group">
                                <label for="nivel">Assunto / Tópico</label>
                                <select name="nivel" id="nivel" required>
                                    <option value="">Selecione a disciplina primeiro...</option>
                                </select>
                            </div>

                          

                        </div>

                        <div class="form-group">
                            <label>Descrição</label>
                            <textarea name="descricao" rows="4" placeholder="O que o aluno aprenderá?"></textarea>
                        </div>

                        <button type="submit" class="btn-primary">
                            Publicar Conteúdo
                        </button>

                    </form>

                </div>

            </section>

        </main>

        <aside class="right-column">

            <div class="profile-card">
                <div class="avatar-large">
                    <img src="https://via.placeholder.com/100" alt="Admin">
                </div>
                <h3>Super Admin</h3>
                <span class="badge">Acesso Total</span>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <strong id="totalVideos">0</strong>
                    <span>Vídeos</span>
                </div>

                <div class="stat-card">
                    <strong id="totalProvas">0</strong>
                    <span>Provas</span>
                </div>
            </div>

            <div class="calendar-card" style="margin-top: 20px;">
                <h4>Últimas Ações</h4>
                <ul class="admin-list" id="listaAcoes"></ul>
            </div>

        </aside>

    </div>

    <script>
        // =========================
        // ELEMENTOS HTML
        // =========================
        const listaAcoes = document.getElementById("listaAcoes");
        const totalVideos = document.getElementById("totalVideos");
        const totalProvas = document.getElementById("totalProvas");
        const formulario = document.querySelector(".admin-form");
        const tituloConteudo = document.getElementById("tituloConteudo");
        const tipoConteudo = document.getElementById("tipoConteudo");

        // =========================
        // CONTEÚDOS SALVOS NO LOCALSTORAGE
        // =========================
        let conteudos = JSON.parse(localStorage.getItem("conteudosAdmin")) || [];
        let acoes = JSON.parse(localStorage.getItem("acoesAdmin")) || [];

        // =========================
        // ATUALIZAR FILTROS DE TÓPICOS DINAMICAMENTE
        // =========================
        function atualizarTopicos() {
            const disciplina = document.getElementById("disciplina").value;
            const nivelSelect = document.getElementById("nivel");
            
            // Reinicia o select de tópicos
            nivelSelect.innerHTML = '<option value="">Selecione o assunto...</option>';
            
            const topicosMatematica = [
                "Matemática - Básica",
                "Matemática - Frações e Números Decimais",
                "Matemática - Estatística",
                "Matemática - Geometria Plana",
                "Matemática - Geometria Espacial",
                "Matemática - Funções",
                "Matemática - Analíse Combinatória e Probabilidade",
                "Matemática - Matrizes"
            ];
            
            const topicosPortugues = [
                "Português - Gêneros Textuais",
                "Português - Morfologia",
                "Português - Classes Gramaticais",
                "Português - Sintaxe",
                "Português - Linguagem",
                "Português - Interpretação de Texto",
                "Português - Escolas Literárias",
                "Português - Redação"
            ];
            
            let listaSelecionada = [];
            if (disciplina === "MATEMATICA") {
                listaSelecionada = topicosMatematica;
            } else if (disciplina === "PORTUGUES") {
                listaSelecionada = topicosPortugues;
            }
            
            listaSelecionada.forEach(function(topico) {
                const option = document.createElement("option");
                option.value = topico;
                option.text = topico;
                nivelSelect.appendChild(option);
            });
        }

        // =========================
        // ATUALIZAR CARDS
        // =========================
        function atualizarCards() {
            const videos = conteudos.filter(item => item.tipo === "VIDEO");
            const provas = conteudos.filter(item => item.tipo === "PROVA");

            totalVideos.textContent = videos.length;
            totalProvas.textContent = provas.length;
        }

        // =========================
        // RENDERIZAR AÇÕES
        // =========================
        function renderizarAcoes() {
            listaAcoes.innerHTML = "";
            acoes.forEach(acao => {
                listaAcoes.innerHTML += `
                    <li>
                        <i class="fas fa-check-circle"></i>
                        ${acao}
                    </li>
                `;
            });
        }

        // =========================
        // ADICIONAR AÇÃO
        // =========================
        function adicionarAcao(texto) {
            acoes.unshift(texto);
            if (acoes.length > 5) {
                acoes.pop();
            }
            localStorage.setItem("acoesAdmin", JSON.stringify(acoes));
            renderizarAcoes();
        }

        // =========================
        // EVENTO SUBMIT DO FORMULÁRIO
        // =========================
        formulario.addEventListener("submit", function (event) {
            // Permite o envio para o Spring Boot processar o banco de dados
            const titulo = tituloConteudo.value;
            const tipo = tipoConteudo.value;

            conteudos.push({
                titulo: titulo,
                tipo: tipo
            });

            localStorage.setItem("conteudosAdmin", JSON.stringify(conteudos));
            adicionarAcao(`${tipo} publicado: ${titulo}`);
            atualizarCards();
        });

        function removerConteudo(index) {
            const removido = conteudos[index];
            conteudos.splice(index, 1);
            localStorage.setItem("conteudosAdmin", JSON.stringify(conteudos));
            adicionarAcao(`${removido.tipo} removido: ${removido.titulo}`);
            atualizarCards();
        }

        // CARREGAR AO ABRIR
        atualizarCards();
        renderizarAcoes();
    </script>

</body>
</html>
