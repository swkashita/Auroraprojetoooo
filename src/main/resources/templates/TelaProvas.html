<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurora - Provas Anteriores</title>
    <link rel="stylesheet" href="TelaProvas.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar-main">
            <div class="logo-section">
                <div class="icon-wrapper">
                    <i class="fas fa-graduation-cap" aria-hidden="true"></i>
                </div>
            </div>
            <nav class="nav-menu">
                <a href="/inicio" class="nav-item"><i class="fas fa-th-large"></i> Início</a>
                <a href="/disciplinas" class="nav-item"><i class="fas fa-book"></i> Disciplinas</a>
                <a href="/exercicios" class="nav-item"><i class="fas fa-edit"></i> Exercícios</a>
                <a href="/provas" class="nav-item active"><i class="fas fa-file-alt"></i> Provas anteriores</a>
                <a href="/material" class="nav-item"><i class="fas fa-plus-circle"></i> Material extra</a>
                <a href="/perfil" class="nav-item"><i class="fas fa-user"></i> Perfil</a>
                <div class="spacer"></div>
                <a href="/login" class="nav-item logout"><i class="fas fa-sign-out-alt"></i> Sair</a>
            </nav>
        </aside>

        <main class="main-layout">
            <header class="header-top">
                <div class="search-global">
                    <input type="text" placeholder="Pesquisar prova ou ano">
                </div>
                
                <div class="user-info-header">
                    <div class="user-profile">
                        <img src="https://via.placeholder.com/40" alt="Avatar de Eduardo Costa" class="avatar">
                        <div class="user-text">
                            <span th:text="${usuario.nome}"></span>
                            <span class="user-status">Online</span>
                        </div>
                    </div>
                    <div class="top-icons">
                        <i class="far fa-bell" title="Notificações"></i>
                        <i class="fas fa-cog" title="Configurações"></i>
                    </div>
                </div>
            </header>

           <section class="content-body">
    <h1 class="title-page">Provas Anteriores</h1>
    
    <div class="provas-grid">
        <div class="prova-card" th:each="prova : ${provas}">
            <div class="prova-icon">
                <i class="fas fa-file-pdf" aria-hidden="true"></i>
            </div>
            <div class="prova-info">
                <h3 th:text="${prova.titulo}">Nome da Prova</h3>
                <span th:text="${prova.descricao}">Descrição ou Ano</span>
            </div>
            
            <a th:href="${prova.urlLink}" target="_blank" class="btn-download" title="Abrir Prova">
                <i class="fas fa-external-link-alt"></i>
            </a>
        </div>

        <div th:if="${#lists.isEmpty(provas)}" style="grid-column: 1/-1; text-align: center; padding: 40px; color: #999;">
            <i class="fas fa-search" style="font-size: 2rem; margin-bottom: 10px;"></i>
            <p>Nenhuma prova cadastrada no momento.</p>
        </div>
    </div>
</section>
        </main>

        <aside class="right-sidebar-padrao" style="width: 300px; padding: 20px;">
            <div class="profile-card-mini" style="text-align: center; background: white; border-radius: 20px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05);">
                <div class="avatar-large">
                    <img src="https://via.placeholder.com/100"  style="border-radius: 50%;">
                </div>
                <h3 style="margin-top: 10px;" th:text="${usuario.nome}"></h3>
                <span class="badge" style="background: #f0f0f0; padding: 5px 10px; border-radius: 15px; font-size: 0.8rem;">Estudante</span>
            </div>
            
            <div class="calendar-mini" style="margin-top: 20px; background: white; border-radius: 20px; padding: 20px;">
                <h4 style="margin-bottom: 10px;">Calendário</h4>
                <p style="font-size: 0.85rem; border-bottom: 1px solid #eee; padding: 5px 0;"><strong>09/11</strong> - ENEM</p>
                <p style="font-size: 0.85rem; padding: 5px 0;"><strong>23/11</strong> - FUVEST</p>
            </div>
        </aside>
    </div>
</body>
</html>
